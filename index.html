<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TermiCon</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at 20% 20%, #1a1f2e, #0a0c12);
            height: 100vh;
            display: flex;
            font-family: 'Courier New', Courier, monospace;
            padding: 0;
            margin: 0;
        }
        .dos-terminal {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(8, 10, 15, 0.95);
            border: none;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            outline: none;
            overflow: hidden;
        }

        .dos-terminal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 2;
            border-radius: inherit;
            mix-blend-mode: screen;
        }

        .dos-terminal::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 40, 40, 0.2) 0%, transparent 80%);
            box-shadow: inset 0 0 50px rgba(0, 20, 20, 0.5);
            pointer-events: none;
            z-index: 1;
            border-radius: inherit;
            animation: crt-flicker 8s infinite;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.8; }
            10% { opacity: 0.85; }
            20% { opacity: 0.8; }
            30% { opacity: 0.9; }
            40% { opacity: 0.8; }
            50% { opacity: 0.85; }
            60% { opacity: 1; }
            70% { opacity: 0.85; }
            80% { opacity: 0.9; }
            90% { opacity: 0.8; }
            100% { opacity: 0.8; }
        }

        .dos-screen {
            flex: 1;
            background: transparent;
            color: #b0ffb0;
            padding: 16px 20px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            outline: none;
            user-select: text;
            scrollbar-width: thin;
            scrollbar-color: #4a5b6b #0f1217;
            text-shadow: 0 0 5px #00ff80, 0 0 12px #00cc66;
            -webkit-overflow-scrolling: touch;
        }
        .dos-screen::-webkit-scrollbar {
            width: 8px;
        }
        .dos-screen::-webkit-scrollbar-track {
            background: #0f1217;
            border-radius: 4px;
        }
        .dos-screen::-webkit-scrollbar-thumb {
            background: #4a5b6b;
            border-radius: 4px;
            border: 1px solid #1e2a33;
        }
        .dos-screen::-webkit-scrollbar-thumb:hover {
            background: #5f7387;
        }
        .output-line {
            margin-bottom: 4px;
            color: #b0ffb0;
            border-bottom: 1px dotted #1e2f3a;
            padding-bottom: 2px;
        }

        .input-line {
            display: flex;
            align-items: center;
            background: #0e1219;
            padding: 10px 20px;
            border-top: 1px solid #2a3a4a;
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.1);
            font-family: 'Courier New', Courier, monospace;
            position: relative;
            z-index: 5;
        }
        .prompt {
            color: #6fcf97;
            margin-right: 12px;
            font-weight: bold;
            text-shadow: 0 0 5px #1affaa;
            flex-shrink: 0;
        }
        .terminal-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #2a3a4a;
            color: #b0ffb0;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.5;
            width: 100%;
            outline: none;
            caret-color: #8ae2b0;
            padding: 4px 0;
            transition: border-color 0.2s;
        }
        .terminal-input:focus {
            border-bottom-color: #6fcf97;
        }
        .terminal-input::placeholder {
            color: #3a4a5a;
            font-style: italic;
            opacity: 0.8;
        }

        /* Меню автодополнения с категориями */
        .autocomplete-menu {
            position: absolute;
            bottom: 100%;
            left: 20px;
            right: 20px;
            background: #0a0f14;
            border: 1px solid #2a3a4a;
            border-radius: 6px 6px 0 0;
            box-shadow: 0 -5px 20px rgba(0, 255, 255, 0.2);
            font-family: 'Courier New', Courier, monospace;
            color: #b0ffb0;
            max-height: 300px;
            overflow-y: auto;
            z-index: 10;
            display: none;
            padding: 4px 0;
        }
        .autocomplete-menu.visible {
            display: block;
        }
        .autocomplete-category {
            padding: 4px 12px;
            font-weight: bold;
            color: #6fcf97;
            background: #0f141a;
            border-bottom: 1px solid #1e2f3a;
            text-transform: uppercase;
            font-size: 0.9em;
            letter-spacing: 1px;
        }
        .autocomplete-item {
            padding: 6px 12px 6px 24px;
            cursor: pointer;
            white-space: nowrap;
            text-shadow: 0 0 3px #00ff80;
            border-left: 3px solid transparent;
            transition: all 0.1s;
        }
        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background: #1a2a33;
            border-left-color: #6fcf97;
            color: #ffffff;
            text-shadow: 0 0 8px #00ff80;
        }
        .autocomplete-item.selected {
            background: #1f2f38;
        }

        .image-link {
            color: #ffaa66;
            text-decoration: underline;
            cursor: pointer;
        }
        .image-link:hover {
            color: #ffcc99;
        }

        #fileUpload {
            display: none;
        }

        a {
            color: #87cefa;
            text-decoration: underline;
            transition: color 0.2s;
        }
        a:hover {
            color: #b0e0ff;
            text-shadow: 0 0 5px #87cefa;
        }
        @media (max-width: 600px) {
            .dos-screen {
                font-size: 14px;
                padding: 12px 16px;
            }
            .dos-terminal::before {
                opacity: 0.5;
                background: repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 255, 0.02) 0px,
                    rgba(0, 255, 255, 0.02) 2px,
                    transparent 2px,
                    transparent 4px
                );
            }
            .dos-terminal::after {
                background: radial-gradient(circle at 50% 50%, rgba(0, 40, 40, 0.1) 0%, transparent 80%);
                box-shadow: inset 0 0 30px rgba(0, 20, 20, 0.3);
            }
            .autocomplete-menu {
                left: 10px;
                right: 10px;
            }
        }
    </style>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="dos-terminal" id="terminalContainer">
        <div class="dos-screen" id="outputArea"></div>
        <div class="input-line">
            <span class="prompt" id="prompt"></span>
            <input type="text" class="terminal-input" id="commandInput" autofocus placeholder="Введите команду">
            <div class="autocomplete-menu" id="autocompleteMenu"></div>
        </div>
        <input type="file" id="fileUpload" accept="image/png, image/jpeg, image/gif, image/bmp, image/webp">
    </div>

    <script>
        (function() {
            const API_BASE = '';

            const outputArea = document.getElementById('outputArea');
            const promptSpan = document.getElementById('prompt');
            const commandInput = document.getElementById('commandInput');
            const fileInput = document.getElementById('fileUpload');
            const autocompleteMenu = document.getElementById('autocompleteMenu');

            let history = [];
            let commandHistory = [];
            let historyIndex = 0;
            let authenticated = false;
            let currentUserId = null;
            let currentLogin = null;
            let mode = 'normal';
            let tempLogin = '';
            let tempPassword = '';
            let tempChannelName = '';
            let lastUnreadHash = null;
            let autoReadEnabled = false;
            let pendingImageId = null;

            let currentCompletions = [];
            let selectedCompletionIndex = -1;

            let socket = null;

            const commandCategories = {
                'Основные': ['написать', 'профиль', 'пинг', 'мойид', 'непрочитанные', 'прочитать', 'прочитать всё', 'помощь', 'выход', 'онлайн'],
                'Каналы': ['канал создать', 'канал подписаться', 'канал отписаться', 'канал написать', 'канал прочитать', 'канал удалить'],
                'Изображения': ['загрузить картинку', 'прочитать картинку', 'открепить', 'аватар']
            };

            const initialLines = [
                'Добро пожаловать в терминал.',
                'Доступные команды: вход, регистрация, загрузить картинку, прочитать картинку, онлайн',
                ''
            ];
            history.push(...initialLines);

            function escapeHTML(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
            }

            function linkify(text) {
                const urlPattern = /(https?:\/\/[^\s]+)/g;
                return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
            }

            function updatePrompt() {
                let promptStr = '';
                if (!authenticated && mode === 'normal') promptStr = '>';
                else if (authenticated && mode === 'normal') promptStr = `${currentLogin}@pc:~$`;
                else if (mode === 'awaiting_login') promptStr = 'Логин:';
                else if (mode === 'awaiting_password') promptStr = 'Пароль:';
                else if (mode === 'awaiting_register_login') promptStr = 'Придумайте логин:';
                else if (mode === 'awaiting_register_password') promptStr = 'Придумайте пароль:';
                else if (mode === 'awaiting_channel_delete_confirmation') promptStr = 'Подтверждение:';
                promptSpan.textContent = promptStr;
            }

            function render() {
                let html = '';
                for (let lineObj of history) {
                    if (typeof lineObj === 'object' && lineObj.text !== undefined) {
                        let escaped = escapeHTML(lineObj.text);
                        let linked = linkify(escaped);
                        if (lineObj.imageId) {
                            linked += ` <span class="image-link" onclick="window.open('/image/${lineObj.imageId}')">[Изображение ID: ${lineObj.imageId}]</span>`;
                        }
                        html += `<div class="output-line">${linked}</div>`;
                    } else {
                        let escaped = escapeHTML(lineObj);
                        let linked = linkify(escaped);
                        html += `<div class="output-line">${linked}</div>`;
                    }
                }
                outputArea.innerHTML = html;
                outputArea.scrollTop = outputArea.scrollHeight;
                updatePrompt();
            }

            function appendHistory(text, imageId = null) {
                if (imageId) {
                    history.push({ text, imageId });
                } else {
                    history.push(text);
                }
                render();
            }

            function resetMode() {
                mode = 'normal';
                tempLogin = '';
                tempPassword = '';
                tempChannelName = '';
                commandInput.value = '';
                render();
            }

            function connectWebSocket() {
                if (socket && socket.connected) return;
                socket = io(API_BASE || window.location.origin, {
                    transports: ['websocket', 'polling'],
                    reconnection: true,
                    reconnectionAttempts: 5
                });
                socket.on('connect', () => {
                    console.log('WebSocket connected');
                    if (currentUserId) {
                        socket.emit('subscribe', { user_id: currentUserId });
                    }
                });
                socket.on('disconnect', () => {
                    console.log('WebSocket disconnected, attempting reconnect...');
                });
                socket.on('connect_error', (err) => {
                    console.error('WebSocket connection error:', err);
                });
                socket.on(`user_${currentUserId}_new_message`, (data) => {
                    appendHistory(`📩 Новое личное сообщение от пользователя ID ${data.from}`);
                    fetchUnreadSummary(true);
                });
                socket.on(`user_${currentUserId}_new_channel_message`, (data) => {
                    appendHistory(`📢 Новое сообщение в канале (ID канала ${data.channel})`);
                    fetchUnreadSummary(true);
                });
            }

            function disconnectWebSocket() {
                if (socket) {
                    if (currentUserId) {
                        socket.emit('unsubscribe', { user_id: currentUserId });
                    }
                    socket.disconnect();
                    socket = null;
                }
            }

            async function fetchUnreadSummary(silent = false) {
                if (!authenticated || !currentUserId) return null;
                try {
                    const resp = await fetch(`${API_BASE}/unread_summary?user_id=${currentUserId}`);
                    if (!resp.ok) {
                        const text = await resp.text();
                        appendHistory(`Ошибка HTTP ${resp.status}: ${text.substring(0, 100)}`);
                        return null;
                    }
                    const data = await resp.json();
                    if (data.error) {
                        appendHistory(`Ошибка: ${data.error}`);
                        return null;
                    }
                    const personal = data.result.personal || [];
                    const channels = data.result.channels || [];
                    const personalHash = JSON.stringify(personal);
                    const channelsHash = JSON.stringify(channels);
                    const currentHash = personalHash + '|' + channelsHash;
                    if (currentHash !== lastUnreadHash) {
                        lastUnreadHash = currentHash;
                        if (!silent) {
                            if (personal.length) {
                                appendHistory('Непрочитанные личные сообщения:');
                                personal.forEach(item => {
                                    appendHistory(`  От ${item.from_login} (ID ${item.from_id}): ${item.count} сообщ.`);
                                });
                            }
                            if (channels.length) {
                                appendHistory('Непрочитанные сообщения в каналах:');
                                channels.forEach(ch => {
                                    appendHistory(`  Канал "${ch.channel_name}" (владелец ${ch.owner_login}): ${ch.unread_count} нов.`);
                                });
                            }
                            if (!personal.length && !channels.length && lastUnreadHash !== null) {
                                appendHistory('Все сообщения прочитаны.');
                            }
                        } else {
                            if (personal.length || channels.length) {
                                if (autoReadEnabled) {
                                    await autoReadAll(personal, channels);
                                } else {
                                    if (personal.length) {
                                        appendHistory(`📩 Новые личные сообщения (${personal.length} отправителей)`);
                                    }
                                    if (channels.length) {
                                        channels.forEach(ch => {
                                            appendHistory(`📢 Канал "${ch.channel_name}": ${ch.unread_count} нов. сообщ.`);
                                        });
                                    }
                                }
                            }
                        }
                    }
                    return { personal, channels };
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                    return null;
                }
            }

            async function autoReadAll(personalList, channelsList) {
                let personalCount = 0;
                let channelsCount = 0;
                if (personalList.length > 0) {
                    try {
                        const resp = await fetch(`${API_BASE}/read_messages`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: currentUserId })
                        });
                        if (resp.ok) {
                            const data = await resp.json();
                            personalCount = data.result ? data.result.length : 0;
                        }
                    } catch (e) {}
                }
                for (const ch of channelsList) {
                    try {
                        const resp = await fetch(`${API_BASE}/channel/read`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: currentUserId, channel_name: ch.channel_name })
                        });
                        if (resp.ok) {
                            channelsCount += ch.unread_count;
                        }
                    } catch (e) {}
                }
                if (personalCount > 0 || channelsCount > 0) {
                    appendHistory(`📖 Автоматически прочитано: личных: ${personalCount}, каналов: ${channelsCount}`);
                }
            }

            async function readMessages(fromId = null) {
                if (!authenticated || !currentUserId) return;
                try {
                    const resp = await fetch(`${API_BASE}/read_messages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, from_id: fromId })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        const messages = data.result || [];
                        if (messages.length) {
                            if (fromId) {
                                appendHistory(`Сообщения от пользователя ID ${fromId}:`);
                            } else {
                                appendHistory('Все непрочитанные личные сообщения:');
                            }
                            messages.forEach(msg => {
                                let line = `[${msg.timestamp}] ${msg.from_login} (${msg.from_id}): ${msg.content}`;
                                appendHistory(line, msg.image_id);
                            });
                        } else {
                            appendHistory('Нет личных сообщений для отображения.');
                        }
                        await fetchUnreadSummary(true);
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelRead(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/read`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                        await fetchUnreadSummary(true);
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelCreate(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/create`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelSubscribe(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/subscribe`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelUnsubscribe(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/unsubscribe`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelSend(name, message, imageId = null) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name, content: message, image_id: imageId })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelDelete(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/delete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                        await fetchUnreadSummary(true);
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function performLogin(login, password) {
                try {
                    const resp = await fetch(`${API_BASE}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login, password })
                    });
                    const data = await resp.json();
                    if (!resp.ok || data.error) {
                        appendHistory(`Ошибка входа: ${data.error || `HTTP ${resp.status}`}`);
                        resetMode();
                        return;
                    }
                    const user = data.result[0];
                    authenticated = true;
                    currentUserId = user.id;
                    currentLogin = user.login;
                    autoReadEnabled = false;
                    pendingImageId = null;
                    appendHistory(`Добро пожаловать, ${user.login}!`);
                    await fetchUnreadSummary(false);
                    connectWebSocket();
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                } finally {
                    resetMode();
                }
            }

            async function performRegister(login, password) {
                try {
                    const resp = await fetch(`${API_BASE}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login, password })
                    });
                    const data = await resp.json();
                    if (!resp.ok || data.error) {
                        appendHistory(`Ошибка регистрации: ${data.error || `HTTP ${resp.status}`}`);
                    } else {
                        data.result.forEach(line => appendHistory(line));
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                } finally {
                    resetMode();
                }
            }

            async function apiCommand(command, args) {
                try {
                    const resp = await fetch(`${API_BASE}/command`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, command, args })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        if (data.result && data.result.length) data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            function uploadImage(file) {
                const formData = new FormData();
                formData.append('user_id', currentUserId);
                formData.append('image', file);

                fetch(`${API_BASE}/upload_image`, {
                    method: 'POST',
                    body: formData
                })
                .then(resp => resp.json())
                .then(data => {
                    if (data.error) {
                        appendHistory(`Ошибка загрузки: ${data.error}`);
                    } else {
                        const imageId = data.result.image_id;
                        pendingImageId = imageId;
                        appendHistory(`✅ Изображение загружено. ID: ${imageId}. Оно будет прикреплено к следующему отправленному сообщению.`);
                    }
                })
                .catch(err => {
                    appendHistory(`Ошибка соединения при загрузке: ${err.message}`);
                });
            }

            async function fetchOnlineUsers() {
                if (!authenticated) {
                    appendHistory('Ошибка: необходимо войти в систему.');
                    return;
                }
                try {
                    const resp = await fetch(`${API_BASE}/online_users`);
                    if (!resp.ok) {
                        appendHistory(`Ошибка HTTP ${resp.status}`);
                        return;
                    }
                    const data = await resp.json();
                    if (data.error) {
                        appendHistory(`Ошибка: ${data.error}`);
                        return;
                    }
                    const users = data.result;
                    if (users.length === 0) {
                        appendHistory('Нет пользователей в сети.');
                    } else {
                        appendHistory('Пользователи в сети:');
                        users.forEach(u => {
                            appendHistory(`  ${u.login} (ID: ${u.id}) — последняя активность: ${u.last_seen}`);
                        });
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            // ---- Полный список команд в зависимости от статуса ----
            function getAllCommands() {
                if (!authenticated) {
                    return ['вход', 'регистрация', 'загрузить картинку', 'прочитать картинку', 'онлайн'];
                } else {
                    return [
                        'написать', 'профиль', 'пинг', 'мойид', 'непрочитанные', 'прочитать', 'прочитать всё',
                        'помощь', 'выход', 'канал', 'автопрочтение', 'загрузить картинку', 'прочитать картинку',
                        'открепить', 'онлайн', 'аватар',
                        'канал создать', 'канал подписаться', 'канал отписаться', 'канал написать', 'канал прочитать', 'канал удалить'
                    ];
                }
            }

            // ---- Автодополнение с категориями ----
            function showAutocomplete(completions) {
                if (!completions || completions.length === 0) {
                    hideAutocomplete();
                    return;
                }
                // группируем по категориям
                let categorized = {};
                for (let cmd of completions) {
                    let found = false;
                    for (let [cat, cmds] of Object.entries(commandCategories)) {
                        if (cmds.includes(cmd) || (cat === 'Основные' && !cmds.includes(cmd) && !cmd.startsWith('канал ') && cmd !== 'загрузить картинку' && cmd !== 'прочитать картинку' && cmd !== 'открепить' && cmd !== 'аватар')) {
                            if (!categorized[cat]) categorized[cat] = [];
                            categorized[cat].push(cmd);
                            found = true;
                            break;
                        }
                    }
                    if (!found) {
                        if (!categorized['Прочее']) categorized['Прочее'] = [];
                        categorized['Прочее'].push(cmd);
                    }
                }
                currentCompletions = completions;
                selectedCompletionIndex = 0;
                renderAutocomplete(categorized);
                autocompleteMenu.classList.add('visible');
            }

            function hideAutocomplete() {
                autocompleteMenu.classList.remove('visible');
                currentCompletions = [];
                selectedCompletionIndex = -1;
            }

            function renderAutocomplete(categorized) {
                let html = '';
                let flatIndex = 0;
                for (let [category, items] of Object.entries(categorized)) {
                    html += `<div class="autocomplete-category">${category}</div>`;
                    items.sort().forEach(item => {
                        const selectedClass = flatIndex === selectedCompletionIndex ? 'selected' : '';
                        html += `<div class="autocomplete-item ${selectedClass}" data-index="${flatIndex}">${item}</div>`;
                        flatIndex++;
                    });
                }
                autocompleteMenu.innerHTML = html;
                document.querySelectorAll('.autocomplete-item').forEach(el => {
                    el.addEventListener('click', (e) => {
                        const index = parseInt(e.target.dataset.index);
                        if (!isNaN(index) && currentCompletions[index]) {
                            completeWith(currentCompletions[index]);
                        }
                    });
                });
            }

            function completeWith(completion) {
                if (!completion) return;
                commandInput.value = completion;          // заменяем всё поле
                commandInput.setSelectionRange(completion.length, completion.length);
                hideAutocomplete();
            }

            // Получение списка команд, начинающихся с префикса (для Tab)
            function getCompletionList(prefix, prevWord) {
                const all = getAllCommands();
                return all.filter(cmd => cmd.startsWith(prefix));
            }

            // ---- Обработка Tab ----
            function handleTab() {
                if (mode !== 'normal') {
                    hideAutocomplete();
                    return;
                }
                const input = commandInput;
                const cursorPos = input.selectionStart;
                const beforeCursor = input.value.slice(0, cursorPos);
                const afterCursor = input.value.slice(cursorPos);
                const lastSpaceBefore = beforeCursor.lastIndexOf(' ');
                const startOfWord = lastSpaceBefore === -1 ? 0 : lastSpaceBefore + 1;
                const wordPrefix = beforeCursor.slice(startOfWord);
                const completions = getCompletionList(wordPrefix, '');
                if (completions.length === 0) {
                    hideAutocomplete();
                    return;
                }
                showAutocomplete(completions);
            }

            // ---- Выполнение команды ----
            function executeCommand(cmd) {
                const trimmed = cmd.trim();
                if (trimmed === '' && mode === 'normal') return;

                if (autocompleteMenu.classList.contains('visible') && selectedCompletionIndex !== -1) {
                    const selected = currentCompletions[selectedCompletionIndex];
                    if (selected) {
                        completeWith(selected);
                    }
                    return;
                }

                hideAutocomplete();

                if (mode !== 'normal') {
                    handleInputInMode(trimmed);
                    return;
                }

                commandHistory.push(trimmed);
                historyIndex = commandHistory.length;

                const promptChar = authenticated ? `${currentLogin}@pc:~$` : '>';
                appendHistory(`${promptChar} ${trimmed}`);

                const parts = trimmed.toLowerCase().split(' ');
                const command = parts[0];
                const args = parts.slice(1);

                if (!authenticated) {
                    if (command === 'вход' || command === 'login') {
                        mode = 'awaiting_login';
                        appendHistory('Введите логин:');
                    } else if (command === 'регистрация' || command === 'register') {
                        mode = 'awaiting_register_login';
                        appendHistory('Придумайте логин:');
                    } else if (command === 'загрузить' && args[0] === 'картинку') {
                        fileInput.click();
                    } else if (command === 'прочитать' && args[0] === 'картинку' && args[1]) {
                        const imageId = args[1];
                        window.open(`/image/${imageId}`, '_blank');
                    } else if (command === 'онлайн') {
                        fetchOnlineUsers();
                    } else {
                        appendHistory('Неизвестная команда. Доступные: вход, регистрация, загрузить картинку, прочитать картинку [id], онлайн');
                    }
                    commandInput.value = '';
                    render();
                    return;
                }

                if (command === 'автопрочтение') {
                    if (args.length === 0) {
                        appendHistory(`Автоматическое прочтение: ${autoReadEnabled ? 'включено' : 'выключено'}`);
                    } else {
                        const arg = args[0];
                        if (arg === 'вкл' || arg === 'on' || arg === '1' || arg === 'да') {
                            autoReadEnabled = true;
                            appendHistory('Автоматическое прочтение включено.');
                        } else if (arg === 'выкл' || arg === 'off' || arg === '0' || arg === 'нет') {
                            autoReadEnabled = false;
                            appendHistory('Автоматическое прочтение выключено.');
                        } else {
                            appendHistory('Использование: автопрочтение [вкл|выкл]');
                        }
                    }
                } else if (command === 'канал') {
                    if (args.length === 0) {
                        appendHistory('Используйте: канал [создать|подписаться|отписаться|написать|прочитать|удалить]');
                        return;
                    }
                    const sub = args[0];
                    const subArgs = args.slice(1).join(' ');
                    if (sub === 'создать') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelCreate(subArgs);
                    } else if (sub === 'подписаться') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelSubscribe(subArgs);
                    } else if (sub === 'отписаться') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelUnsubscribe(subArgs);
                    } else if (sub === 'написать') {
                        const trimmedArgs = subArgs.trim();
                        let chName = '', message = '';
                        if (trimmedArgs.startsWith('"')) {
                            const closeQuoteIndex = trimmedArgs.indexOf('"', 1);
                            if (closeQuoteIndex === -1) { appendHistory('Ошибка: не найдена закрывающая кавычка.'); return; }
                            chName = trimmedArgs.substring(1, closeQuoteIndex).trim();
                            message = trimmedArgs.substring(closeQuoteIndex + 1).trim();
                        } else {
                            const spaceIndex = trimmedArgs.indexOf(' ');
                            if (spaceIndex === -1) { appendHistory('Укажите название и сообщение: канал написать [название] [текст]'); return; }
                            chName = trimmedArgs.substring(0, spaceIndex).trim();
                            message = trimmedArgs.substring(spaceIndex + 1).trim();
                        }
                        channelSend(chName, message, pendingImageId);
                        if (pendingImageId) pendingImageId = null;
                    } else if (sub === 'прочитать') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelRead(subArgs);
                    } else if (sub === 'удалить') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        tempChannelName = subArgs;
                        mode = 'awaiting_channel_delete_confirmation';
                        appendHistory(`Вы уверены, что хотите удалить канал "${tempChannelName}"? (да/нет)`);
                        commandInput.value = '';
                        render();
                        return;
                    } else {
                        appendHistory(`Неизвестная подкоманда: ${sub}`);
                    }
                } else if (command === 'написать' && args.length >= 2) {
                    const toId = args[0];
                    const message = args.slice(1).join(' ');
                    apiCommand('написать', { to_id: toId, message: message, image_id: pendingImageId });
                    if (pendingImageId) pendingImageId = null;
                } else if (command === 'профиль' && args.length >= 1) {
                    apiCommand('профиль', { profile_id: args[0] });
                } else if (command === 'пинг' || command === 'ping') {
                    apiCommand('пинг', {});
                } else if (command === 'мойид' || command === 'id') {
                    appendHistory(`Ваш ID: ${currentUserId}`);
                } else if (command === 'непрочитанные' || command === 'список') {
                    fetchUnreadSummary(false);
                } else if (command === 'прочитать' && args.length >= 1 && args[0] !== 'всё' && args[0] !== 'картинку') {
                    readMessages(args[0]);
                } else if (command === 'прочитать всё' || (command === 'прочитать' && args[0] === 'всё')) {
                    readMessages();
                } else if (command === 'помощь' || command === 'help') {
                    showHelp();
                } else if (command === 'выход' || command === 'exit') {
                    authenticated = false;
                    currentUserId = null;
                    currentLogin = null;
                    lastUnreadHash = null;
                    autoReadEnabled = false;
                    pendingImageId = null;
                    disconnectWebSocket();
                    appendHistory('Вы вышли из аккаунта.');
                    appendHistory('Доступные команды: вход, регистрация, загрузить картинку, прочитать картинку, онлайн');
                } else if (command === 'загрузить' && args[0] === 'картинку') {
                    fileInput.click();
                } else if (command === 'прочитать' && args[0] === 'картинку' && args[1]) {
                    const imageId = args[1];
                    window.open(`/image/${imageId}`, '_blank');
                } else if (command === 'открепить') {
                    if (pendingImageId) {
                        pendingImageId = null;
                        appendHistory('Изображение откреплено.');
                    } else {
                        appendHistory('Нет прикреплённого изображения.');
                    }
                } else if (command === 'онлайн') {
                    fetchOnlineUsers();
                } else if (command === 'аватар') {
                    if (args[0]) {
                        const imageId = args[0];
                        apiCommand('аватар', { image_id: imageId });
                    } else {
                        appendHistory('Использование: аватар [ID изображения]');
                    }
                } else {
                    appendHistory(`Неизвестная команда: ${command}. Введите "помощь" для списка команд.`);
                }

                commandInput.value = '';
                render();
            }

            function showHelp() {
                appendHistory('Доступные команды:');
                appendHistory('  написать [id] [сообщение]   - отправить личное сообщение (автоматически прикрепляет загруженную картинку)');
                appendHistory('  профиль [id]                - просмотр профиля');
                appendHistory('  непрочитанные                - список контактов с непрочитанными');
                appendHistory('  прочитать [id]               - прочитать личные сообщения от пользователя');
                appendHistory('  прочитать всё                - прочитать все непрочитанные личные');
                appendHistory('  пинг                         - проверка связи');
                appendHistory('  мойид                        - показать свой ID');
                appendHistory('  автопрочтение [вкл|выкл]     - включить/выключить авто-прочтение');
                appendHistory('  загрузить картинку           - открыть проводник для выбора изображения');
                appendHistory('  прочитать картинку [id]      - открыть изображение');
                appendHistory('  открепить                    - открепить текущее изображение');
                appendHistory('  онлайн                       - показать пользователей в сети');
                appendHistory('  аватар [id]                  - установить аватар (ID загруженного изображения)');
                appendHistory('  помощь                       - эта справка');
                appendHistory('  выход                        - выйти из аккаунта');
                appendHistory('');
                appendHistory('Команды для каналов:');
                appendHistory('  канал создать [название]               - создать канал');
                appendHistory('  канал подписаться [название]           - подписаться на канал');
                appendHistory('  канал отписаться [название]            - отписаться от канала');
                appendHistory('  канал написать ["название"] [сообщение]  - отправить сообщение (только владелец)');
                appendHistory('  канал прочитать [название]             - прочитать новые сообщения');
                appendHistory('  канал удалить [название]               - удалить канал (с подтверждением)');
            }

            function handleInputInMode(input) {
                if (mode === 'awaiting_login') {
                    tempLogin = input;
                    mode = 'awaiting_password';
                    appendHistory('Введите пароль:');
                } else if (mode === 'awaiting_password') {
                    tempPassword = input;
                    performLogin(tempLogin, tempPassword);
                } else if (mode === 'awaiting_register_login') {
                    tempLogin = input;
                    mode = 'awaiting_register_password';
                    appendHistory('Придумайте пароль:');
                } else if (mode === 'awaiting_register_password') {
                    tempPassword = input;
                    performRegister(tempLogin, tempPassword);
                } else if (mode === 'awaiting_channel_delete_confirmation') {
                    const answer = input.trim().toLowerCase();
                    if (answer === 'да' || answer === 'yes' || answer === 'y' || answer === 'д') {
                        channelDelete(tempChannelName);
                    } else {
                        appendHistory('Удаление отменено.');
                    }
                    resetMode();
                }
                commandInput.value = '';
                render();
            }

            // ---- Обработчики событий ----
            commandInput.addEventListener('input', () => {
                if (mode !== 'normal') return;
                const val = commandInput.value.trim().toLowerCase();
                if (val.length < 2) {
                    hideAutocomplete();
                    return;
                }
                const all = getAllCommands();
                const completions = all.filter(cmd => cmd.includes(val)).slice(0, 20);
                if (completions.length > 0) {
                    showAutocomplete(completions);
                } else {
                    hideAutocomplete();
                }
            });

            commandInput.addEventListener('keydown', (e) => {
                const key = e.key;
                const input = commandInput;

                if (autocompleteMenu.classList.contains('visible')) {
                    if (key === 'ArrowUp') {
                        e.preventDefault();
                        if (selectedCompletionIndex > 0) {
                            selectedCompletionIndex--;
                        } else {
                            selectedCompletionIndex = currentCompletions.length - 1;
                        }
                        // перестроим меню с текущими completion'ами (они уже в currentCompletions)
                        let categorized = {};
                        for (let cmd of currentCompletions) {
                            let found = false;
                            for (let [cat, cmds] of Object.entries(commandCategories)) {
                                if (cmds.includes(cmd) || (cat === 'Основные' && !cmds.includes(cmd) && !cmd.startsWith('канал ') && cmd !== 'загрузить картинку' && cmd !== 'прочитать картинку' && cmd !== 'открепить' && cmd !== 'аватар')) {
                                    if (!categorized[cat]) categorized[cat] = [];
                                    categorized[cat].push(cmd);
                                    found = true;
                                    break;
                                }
                            }
                            if (!found) {
                                if (!categorized['Прочее']) categorized['Прочее'] = [];
                                categorized['Прочее'].push(cmd);
                            }
                        }
                        renderAutocomplete(categorized);
                        return;
                    }
                    if (key === 'ArrowDown') {
                        e.preventDefault();
                        if (selectedCompletionIndex < currentCompletions.length - 1) {
                            selectedCompletionIndex++;
                        } else {
                            selectedCompletionIndex = 0;
                        }
                        let categorized = {};
                        for (let cmd of currentCompletions) {
                            let found = false;
                            for (let [cat, cmds] of Object.entries(commandCategories)) {
                                if (cmds.includes(cmd) || (cat === 'Основные' && !cmds.includes(cmd) && !cmd.startsWith('канал ') && cmd !== 'загрузить картинку' && cmd !== 'прочитать картинку' && cmd !== 'открепить' && cmd !== 'аватар')) {
                                    if (!categorized[cat]) categorized[cat] = [];
                                    categorized[cat].push(cmd);
                                    found = true;
                                    break;
                                }
                            }
                            if (!found) {
                                if (!categorized['Прочее']) categorized['Прочее'] = [];
                                categorized['Прочее'].push(cmd);
                            }
                        }
                        renderAutocomplete(categorized);
                        return;
                    }
                    if (key === 'Enter' || key === 'Tab') {
                        e.preventDefault();
                        if (selectedCompletionIndex !== -1) {
                            completeWith(currentCompletions[selectedCompletionIndex]);
                        } else {
                            hideAutocomplete();
                        }
                        return;
                    }
                    if (key === 'Escape') {
                        e.preventDefault();
                        hideAutocomplete();
                        return;
                    }
                    // При любом другом нажатии меню скрывается (оно перестроится по input)
                }

                if (e.ctrlKey && key === 'v') {
                    e.preventDefault();
                    navigator.clipboard.readText().then(text => {
                        const start = input.selectionStart;
                        const end = input.selectionEnd;
                        const newValue = input.value.substring(0, start) + text + input.value.substring(end);
                        input.value = newValue;
                        input.setSelectionRange(start + text.length, start + text.length);
                    }).catch(err => {
                        appendHistory('Не удалось вставить текст: ' + err);
                    });
                    return;
                }

                if (key === 'Enter') {
                    e.preventDefault();
                    executeCommand(input.value);
                    return;
                }

                if (key === 'Tab') {
                    e.preventDefault();
                    handleTab();
                    return;
                }

                if (key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        input.value = commandHistory[historyIndex] || '';
                        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
                    }
                    return;
                }
                if (key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        input.value = commandHistory[historyIndex] || '';
                        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
                    } else {
                        historyIndex = commandHistory.length;
                        input.value = '';
                    }
                    return;
                }
            });

            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (!authenticated) {
                        appendHistory('Ошибка: необходимо войти в систему для загрузки изображений.');
                        return;
                    }
                    uploadImage(file);
                }
                fileInput.value = '';
            });

            document.getElementById('terminalContainer').addEventListener('click', () => commandInput.focus());

            commandInput.addEventListener('blur', () => {
                setTimeout(() => hideAutocomplete(), 200);
            });

            render();
        })();
    </script>
</body>
</html>
