<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TermiCon</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background: radial-gradient(circle at 20% 20%, #1a1f2e, #0a0c12);
            height: 100vh;
            display: flex;
            font-family: 'Courier New', Courier, monospace;
            padding: 16px;
        }
        .dos-terminal {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(8, 10, 15, 0.95);
            border: none;
            border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            outline: none;
            overflow: hidden;
        }

        /* ЭЛТ-эффект: сканирующие линии */
        .dos-terminal::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 255, 0.03) 0px,
                rgba(0, 255, 255, 0.03) 2px,
                transparent 2px,
                transparent 4px
            );
            pointer-events: none;
            z-index: 2;
            border-radius: inherit;
            mix-blend-mode: screen;
        }

        /* ЭЛТ-эффект: виньетка и мерцание */
        .dos-terminal::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 40, 40, 0.2) 0%, transparent 80%);
            box-shadow: inset 0 0 50px rgba(0, 20, 20, 0.5);
            pointer-events: none;
            z-index: 1;
            border-radius: inherit;
            animation: crt-flicker 8s infinite;
        }

        @keyframes crt-flicker {
            0% { opacity: 0.8; }
            10% { opacity: 0.85; }
            20% { opacity: 0.8; }
            30% { opacity: 0.9; }
            40% { opacity: 0.8; }
            50% { opacity: 0.85; }
            60% { opacity: 1; }
            70% { opacity: 0.85; }
            80% { opacity: 0.9; }
            90% { opacity: 0.8; }
            100% { opacity: 0.8; }
        }

        .dos-screen {
            flex: 1;
            background: transparent;
            color: #d0e0e0;
            padding: 16px 20px;
            overflow-y: auto;
            font-size: 16px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
            outline: none;
            user-select: text;
            scrollbar-width: thin;
            scrollbar-color: #4a5b6b #0f1217;
            text-shadow: 0 0 3px #00ffff, 0 0 8px #006666;
            -webkit-overflow-scrolling: touch;
        }
        .dos-screen::-webkit-scrollbar {
            width: 8px;
        }
        .dos-screen::-webkit-scrollbar-track {
            background: #0f1217;
            border-radius: 4px;
        }
        .dos-screen::-webkit-scrollbar-thumb {
            background: #4a5b6b;
            border-radius: 4px;
            border: 1px solid #1e2a33;
        }
        .dos-screen::-webkit-scrollbar-thumb:hover {
            background: #5f7387;
        }
        .output-line {
            margin-bottom: 4px;
            color: #c0d0d0;
            border-bottom: 1px dotted #1e2f3a;
            padding-bottom: 2px;
        }

        /* Единый стиль строки ввода для всех устройств */
        .input-line {
            display: flex;
            align-items: center;
            background: #0e1219;
            padding: 10px 20px;
            border-top: 1px solid #2a3a4a;
            box-shadow: 0 -5px 15px rgba(0, 255, 255, 0.1);
            font-family: 'Courier New', Courier, monospace;
        }
        .prompt {
            color: #6fcf97;
            margin-right: 12px;
            font-weight: bold;
            text-shadow: 0 0 5px #1affaa;
            flex-shrink: 0;
        }
        .terminal-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid #2a3a4a;
            color: #d0e0e0;
            font-family: inherit;
            font-size: 16px;
            line-height: 1.5;
            width: 100%;
            outline: none;
            caret-color: #8ae2b0;
            padding: 4px 0;
            transition: border-color 0.2s;
        }
        .terminal-input:focus {
            border-bottom-color: #6fcf97;
        }
        .terminal-input::placeholder {
            color: #3a4a5a;
            font-style: italic;
            opacity: 0.8;
        }
        a {
            color: #87cefa;
            text-decoration: underline;
            transition: color 0.2s;
        }
        a:hover {
            color: #b0e0ff;
            text-shadow: 0 0 5px #87cefa;
        }
        @media (max-width: 600px) {
            body {
                padding: 8px;
            }
            .dos-screen {
                font-size: 14px;
                padding: 12px 16px;
            }
            .dos-terminal::before {
                opacity: 0.5;
                background: repeating-linear-gradient(
                    0deg,
                    rgba(0, 255, 255, 0.02) 0px,
                    rgba(0, 255, 255, 0.02) 2px,
                    transparent 2px,
                    transparent 4px
                );
            }
            .dos-terminal::after {
                background: radial-gradient(circle at 50% 50%, rgba(0, 40, 40, 0.1) 0%, transparent 80%);
                box-shadow: inset 0 0 30px rgba(0, 20, 20, 0.3);
            }
        }
    </style>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
</head>
<body>
    <div class="dos-terminal" id="terminalContainer">
        <div class="dos-screen" id="outputArea"></div>
        <!-- Единая строка ввода -->
        <div class="input-line">
            <span class="prompt" id="prompt"></span>
            <input type="text" class="terminal-input" id="commandInput" autofocus placeholder="Введите команду">
        </div>
    </div>

    <script>
        (function() {
            // --- Константы и состояние ---
            const API_BASE = '';  // пусто, если фронт и бэк на одном домене

            // DOM-элементы
            const outputArea = document.getElementById('outputArea');
            const promptSpan = document.getElementById('prompt');
            const commandInput = document.getElementById('commandInput');

            // Состояние приложения
            let history = [];                 // массив строк для вывода
            let commandHistory = [];           // история введённых команд
            let historyIndex = 0;              // текущая позиция в истории
            let authenticated = false;
            let currentUserId = null;
            let currentLogin = null;
            let mode = 'normal';                // 'normal', 'awaiting_login', 'awaiting_password', 'awaiting_register_login', 'awaiting_register_password', 'awaiting_channel_delete_confirmation'
            let tempLogin = '';
            let tempPassword = '';
            let tempChannelName = '';
            let lastUnreadHash = null;
            let autoReadEnabled = false;

            // WebSocket
            let socket = null;

            // --- Инициализация истории ---
            const initialLines = [
                'Добро пожаловать в терминал.',
                'Доступные команды:',
                '  вход         - выполнить вход',
                '  регистрация  - создать новый аккаунт',
                '  выход        - выйти из аккаунта',
                '----------------------------------------------',
                ''
            ];
            history.push(...initialLines);

            // --- Вспомогательные функции ---
            function escapeHTML(str) {
                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
            }

            function linkify(text) {
                const urlPattern = /(https?:\/\/[^\s]+)/g;
                return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
            }

            function updatePrompt() {
                let promptStr = '';
                if (!authenticated && mode === 'normal') promptStr = '>';
                else if (authenticated && mode === 'normal') promptStr = `${currentLogin}@pc:~$`;
                else if (mode === 'awaiting_login') promptStr = 'Логин:';
                else if (mode === 'awaiting_password') promptStr = 'Пароль:';
                else if (mode === 'awaiting_register_login') promptStr = 'Придумайте логин:';
                else if (mode === 'awaiting_register_password') promptStr = 'Придумайте пароль:';
                else if (mode === 'awaiting_channel_delete_confirmation') promptStr = 'Подтверждение:';
                promptSpan.textContent = promptStr;
            }

            function render() {
                // Отрисовка истории
                let html = '';
                for (let line of history) {
                    let escaped = escapeHTML(line);
                    let linked = linkify(escaped);
                    html += `<div class="output-line">${linked}</div>`;
                }
                outputArea.innerHTML = html;
                outputArea.scrollTop = outputArea.scrollHeight;

                // Обновляем промпт
                updatePrompt();
            }

            function appendHistory(text) {
                history.push(text);
                render();
            }

            function resetMode() {
                mode = 'normal';
                tempLogin = '';
                tempPassword = '';
                tempChannelName = '';
                commandInput.value = '';
                render();
            }

            // --- WebSocket ---
            function connectWebSocket() {
                if (socket && socket.connected) return;
                socket = io(API_BASE || window.location.origin, {
                    transports: ['websocket', 'polling']
                });
                socket.on('connect', () => {
                    console.log('WebSocket connected');
                    if (currentUserId) {
                        socket.emit('subscribe', { user_id: currentUserId });
                    }
                });
                socket.on('disconnect', () => {
                    console.log('WebSocket disconnected, attempting reconnect...');
                });
                socket.on('connect_error', (err) => {
                    console.error('WebSocket connection error:', err);
                });
                socket.on(`user_${currentUserId}_new_message`, (data) => {
                    appendHistory(`📩 Новое личное сообщение от пользователя ID ${data.from}`);
                    fetchUnreadSummary(true);
                });
                socket.on(`user_${currentUserId}_new_channel_message`, (data) => {
                    appendHistory(`📢 Новое сообщение в канале (ID канала ${data.channel})`);
                    fetchUnreadSummary(true);
                });
            }

            function disconnectWebSocket() {
                if (socket) {
                    if (currentUserId) {
                        socket.emit('unsubscribe', { user_id: currentUserId });
                    }
                    socket.disconnect();
                    socket = null;
                }
            }

            // --- Работа с сервером (асинхронные запросы) ---
            async function fetchUnreadSummary(silent = false) {
                if (!authenticated || !currentUserId) return null;
                try {
                    const resp = await fetch(`${API_BASE}/unread_summary?user_id=${currentUserId}`);
                    if (!resp.ok) {
                        const text = await resp.text();
                        appendHistory(`Ошибка HTTP ${resp.status}: ${text.substring(0, 100)}`);
                        return null;
                    }
                    const data = await resp.json();
                    if (data.error) {
                        appendHistory(`Ошибка: ${data.error}`);
                        return null;
                    }
                    const personal = data.result.personal || [];
                    const channels = data.result.channels || [];
                    const personalHash = JSON.stringify(personal);
                    const channelsHash = JSON.stringify(channels);
                    const currentHash = personalHash + '|' + channelsHash;
                    if (currentHash !== lastUnreadHash) {
                        lastUnreadHash = currentHash;
                        if (!silent) {
                            if (personal.length) {
                                appendHistory('Непрочитанные личные сообщения:');
                                personal.forEach(item => {
                                    appendHistory(`  От ${item.from_login} (ID ${item.from_id}): ${item.count} сообщ.`);
                                });
                            }
                            if (channels.length) {
                                appendHistory('Непрочитанные сообщения в каналах:');
                                channels.forEach(ch => {
                                    appendHistory(`  Канал "${ch.channel_name}" (владелец ${ch.owner_login}): ${ch.unread_count} нов.`);
                                });
                            }
                            if (!personal.length && !channels.length && lastUnreadHash !== null) {
                                appendHistory('Все сообщения прочитаны.');
                            }
                        } else {
                            if (personal.length || channels.length) {
                                if (autoReadEnabled) {
                                    await autoReadAll(personal, channels);
                                } else {
                                    if (personal.length) {
                                        appendHistory(`📩 Новые личные сообщения (${personal.length} отправителей)`);
                                    }
                                    if (channels.length) {
                                        channels.forEach(ch => {
                                            appendHistory(`📢 Канал "${ch.channel_name}": ${ch.unread_count} нов. сообщ.`);
                                        });
                                    }
                                }
                            }
                        }
                    }
                    return { personal, channels };
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                    return null;
                }
            }

            async function autoReadAll(personalList, channelsList) {
                let personalCount = 0;
                let channelsCount = 0;
                if (personalList.length > 0) {
                    try {
                        const resp = await fetch(`${API_BASE}/read_messages`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: currentUserId })
                        });
                        if (resp.ok) {
                            const data = await resp.json();
                            personalCount = data.result ? data.result.length : 0;
                        }
                    } catch (e) {}
                }
                for (const ch of channelsList) {
                    try {
                        const resp = await fetch(`${API_BASE}/channel/read`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ user_id: currentUserId, channel_name: ch.channel_name })
                        });
                        if (resp.ok) {
                            channelsCount += ch.unread_count;
                        }
                    } catch (e) {}
                }
                if (personalCount > 0 || channelsCount > 0) {
                    appendHistory(`📖 Автоматически прочитано: личных: ${personalCount}, каналов: ${channelsCount}`);
                }
            }

            async function readMessages(fromId = null) {
                if (!authenticated || !currentUserId) return;
                try {
                    const resp = await fetch(`${API_BASE}/read_messages`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, from_id: fromId })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        const messages = data.result || [];
                        if (messages.length) {
                            if (fromId) {
                                appendHistory(`Сообщения от пользователя ID ${fromId}:`);
                            } else {
                                appendHistory('Все непрочитанные личные сообщения:');
                            }
                            messages.forEach(msg => {
                                appendHistory(`[${msg.timestamp}] ${msg.from_login} (${msg.from_id}): ${msg.content}`);
                            });
                        } else {
                            appendHistory('Нет личных сообщений для отображения.');
                        }
                        await fetchUnreadSummary(true);
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelRead(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/read`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                        await fetchUnreadSummary(true);
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelCreate(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/create`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelSubscribe(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/subscribe`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelUnsubscribe(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/unsubscribe`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelSend(name, message) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/send`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name, content: message })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function channelDelete(name) {
                try {
                    const resp = await fetch(`${API_BASE}/channel/delete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, channel_name: name })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        data.result.forEach(line => appendHistory(line));
                        await fetchUnreadSummary(true);
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            async function performLogin(login, password) {
                try {
                    const resp = await fetch(`${API_BASE}/login`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login, password })
                    });
                    const data = await resp.json();
                    if (!resp.ok || data.error) {
                        appendHistory(`Ошибка входа: ${data.error || `HTTP ${resp.status}`}`);
                        resetMode();
                        return;
                    }
                    const user = data.result[0];
                    authenticated = true;
                    currentUserId = user.id;
                    currentLogin = user.login;
                    autoReadEnabled = false;
                    appendHistory(`Добро пожаловать, ${user.login}!`);
                    await fetchUnreadSummary(false);
                    connectWebSocket();
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                } finally {
                    resetMode();
                }
            }

            async function performRegister(login, password) {
                try {
                    const resp = await fetch(`${API_BASE}/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login, password })
                    });
                    const data = await resp.json();
                    if (!resp.ok || data.error) {
                        appendHistory(`Ошибка регистрации: ${data.error || `HTTP ${resp.status}`}`);
                    } else {
                        data.result.forEach(line => appendHistory(line));
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                } finally {
                    resetMode();
                }
            }

            async function apiCommand(command, args) {
                try {
                    const resp = await fetch(`${API_BASE}/command`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: currentUserId, command, args })
                    });
                    const data = await resp.json();
                    if (resp.ok && !data.error) {
                        if (data.result && data.result.length) data.result.forEach(line => appendHistory(line));
                    } else {
                        appendHistory(`Ошибка: ${data.error || 'неизвестная ошибка'}`);
                    }
                } catch (err) {
                    appendHistory(`Ошибка соединения: ${err.message}`);
                }
            }

            // --- Обработка команд ---
            function getCompletionList(prefix, prevWord) {
                if (!authenticated) {
                    return ['вход', 'регистрация'].filter(cmd => cmd.startsWith(prefix));
                } else {
                    if (prevWord === 'канал') {
                        return ['создать', 'подписаться', 'отписаться', 'написать', 'прочитать', 'удалить'].filter(cmd => cmd.startsWith(prefix));
                    } else {
                        return ['написать', 'профиль', 'пинг', 'мойид', 'непрочитанные', 'прочитать', 'прочитать всё', 'помощь', 'выход', 'канал', 'автопрочтение'].filter(cmd => cmd.startsWith(prefix));
                    }
                }
            }

            function handleTab(currentValue, cursorPosition, setValueCallback) {
                if (mode !== 'normal') return;
                const beforeCursor = currentValue.slice(0, cursorPosition);
                const afterCursor = currentValue.slice(cursorPosition);
                const lastSpaceBefore = beforeCursor.lastIndexOf(' ');
                const startOfWord = lastSpaceBefore === -1 ? 0 : lastSpaceBefore + 1;
                const wordPrefix = beforeCursor.slice(startOfWord);
                const beforeCurrent = beforeCursor.slice(0, startOfWord).trim();
                const prevWord = beforeCurrent.split(' ').pop() || '';
                const completions = getCompletionList(wordPrefix, prevWord);
                if (completions.length === 0) return;
                if (completions.length === 1) {
                    const completion = completions[0];
                    const newBefore = beforeCursor.slice(0, startOfWord) + completion;
                    const newValue = newBefore + afterCursor;
                    setValueCallback(newValue, newBefore.length);
                } else {
                    appendHistory('Возможные варианты: ' + completions.join(', '));
                }
            }

            function executeCommand(cmd) {
                const trimmed = cmd.trim();
                if (trimmed === '' && mode === 'normal') return;

                // Если находимся в специальном режиме (ожидание ввода)
                if (mode !== 'normal') {
                    handleInputInMode(trimmed);
                    return;
                }

                // Добавляем команду в историю
                commandHistory.push(trimmed);
                historyIndex = commandHistory.length;

                // Отображаем введённую команду
                const promptChar = authenticated ? `${currentLogin}@pc:~$` : '>';
                appendHistory(`${promptChar} ${trimmed}`);

                const parts = trimmed.toLowerCase().split(' ');
                const command = parts[0];
                const args = parts.slice(1);

                // Неавторизованный режим
                if (!authenticated) {
                    if (command === 'вход' || command === 'login') {
                        mode = 'awaiting_login';
                        appendHistory('Введите логин:');
                    } else if (command === 'регистрация' || command === 'register') {
                        mode = 'awaiting_register_login';
                        appendHistory('Придумайте логин:');
                    } else {
                        appendHistory('Неизвестная команда. Доступные: вход, регистрация');
                    }
                    commandInput.value = '';
                    render();
                    return;
                }

                // Авторизованные команды
                if (command === 'автопрочтение') {
                    if (args.length === 0) {
                        appendHistory(`Автоматическое прочтение: ${autoReadEnabled ? 'включено' : 'выключено'}`);
                    } else {
                        const arg = args[0];
                        if (arg === 'вкл' || arg === 'on' || arg === '1' || arg === 'да') {
                            autoReadEnabled = true;
                            appendHistory('Автоматическое прочтение включено.');
                        } else if (arg === 'выкл' || arg === 'off' || arg === '0' || arg === 'нет') {
                            autoReadEnabled = false;
                            appendHistory('Автоматическое прочтение выключено.');
                        } else {
                            appendHistory('Использование: автопрочтение [вкл|выкл]');
                        }
                    }
                } else if (command === 'канал') {
                    if (args.length === 0) {
                        appendHistory('Используйте: канал [создать|подписаться|отписаться|написать|прочитать|удалить]');
                        return;
                    }
                    const sub = args[0];
                    const subArgs = args.slice(1).join(' ');
                    if (sub === 'создать') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelCreate(subArgs);
                    } else if (sub === 'подписаться') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelSubscribe(subArgs);
                    } else if (sub === 'отписаться') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelUnsubscribe(subArgs);
                    } else if (sub === 'написать') {
                        const trimmedArgs = subArgs.trim();
                        let chName = '', message = '';
                        if (trimmedArgs.startsWith('"')) {
                            const closeQuoteIndex = trimmedArgs.indexOf('"', 1);
                            if (closeQuoteIndex === -1) { appendHistory('Ошибка: не найдена закрывающая кавычка.'); return; }
                            chName = trimmedArgs.substring(1, closeQuoteIndex).trim();
                            message = trimmedArgs.substring(closeQuoteIndex + 1).trim();
                            if (!chName || !message) { appendHistory('Ошибка: название и сообщение не могут быть пустыми.'); return; }
                        } else {
                            const spaceIndex = trimmedArgs.indexOf(' ');
                            if (spaceIndex === -1) { appendHistory('Укажите название и сообщение: канал написать [название] [текст]'); return; }
                            chName = trimmedArgs.substring(0, spaceIndex).trim();
                            message = trimmedArgs.substring(spaceIndex + 1).trim();
                            if (!chName || !message) { appendHistory('Укажите название и сообщение.'); return; }
                        }
                        channelSend(chName, message);
                    } else if (sub === 'прочитать') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        channelRead(subArgs);
                    } else if (sub === 'удалить') {
                        if (!subArgs) { appendHistory('Укажите название канала.'); return; }
                        tempChannelName = subArgs;
                        mode = 'awaiting_channel_delete_confirmation';
                        appendHistory(`Вы уверены, что хотите удалить канал "${tempChannelName}"? (да/нет)`);
                        commandInput.value = '';
                        render();
                        return;
                    } else {
                        appendHistory(`Неизвестная подкоманда: ${sub}`);
                    }
                } else if (command === 'написать' && args.length >= 2) {
                    const toId = args[0];
                    const message = args.slice(1).join(' ');
                    apiCommand('написать', { to_id: toId, message: message });
                } else if (command === 'профиль' && args.length >= 1) {
                    apiCommand('профиль', { profile_id: args[0] });
                } else if (command === 'пинг' || command === 'ping') {
                    apiCommand('пинг', {});
                } else if (command === 'мойид' || command === 'id') {
                    appendHistory(`Ваш ID: ${currentUserId}`);
                } else if (command === 'непрочитанные' || command === 'список') {
                    fetchUnreadSummary(false);
                } else if (command === 'прочитать' && args.length >= 1 && args[0] !== 'всё') {
                    readMessages(args[0]);
                } else if (command === 'прочитать всё' || (command === 'прочитать' && args[0] === 'всё')) {
                    readMessages();
                } else if (command === 'помощь' || command === 'help') {
                    showHelp();
                } else if (command === 'выход' || command === 'exit') {
                    authenticated = false;
                    currentUserId = null;
                    currentLogin = null;
                    lastUnreadHash = null;
                    autoReadEnabled = false;
                    disconnectWebSocket();
                    appendHistory('Вы вышли из аккаунта.');
                    appendHistory('Доступные команды: вход, регистрация');
                } else {
                    appendHistory(`Неизвестная команда: ${command}. Введите "помощь" для списка команд.`);
                }

                // Очищаем поле ввода
                commandInput.value = '';
                render();
            }

            function showHelp() {
                appendHistory('Доступные команды:');
                appendHistory('  написать [id] [сообщение]   - отправить личное сообщение');
                appendHistory('  профиль [id]                - просмотр профиля');
                appendHistory('  непрочитанные                - список контактов с непрочитанными');
                appendHistory('  прочитать [id]               - прочитать личные сообщения от пользователя');
                appendHistory('  прочитать всё                - прочитать все непрочитанные личные');
                appendHistory('  пинг                         - проверка связи');
                appendHistory('  мойид                        - показать свой ID');
                appendHistory('  автопрочтение [вкл|выкл]     - включить/выключить авто-прочтение');
                appendHistory('  помощь                       - эта справка');
                appendHistory('  выход                        - выйти из аккаунта');
                appendHistory('');
                appendHistory('Команды для каналов:');
                appendHistory('  канал создать [название]               - создать канал');
                appendHistory('  канал подписаться [название]           - подписаться на канал');
                appendHistory('  канал отписаться [название]            - отписаться от канала');
                appendHistory('  канал написать ["название"] [сообщение]  - отправить сообщение (только владелец)');
                appendHistory('  канал прочитать [название]             - прочитать новые сообщения');
                appendHistory('  канал удалить [название]               - удалить канал (с подтверждением)');
            }

            function handleInputInMode(input) {
                if (mode === 'awaiting_login') {
                    tempLogin = input;
                    mode = 'awaiting_password';
                    appendHistory('Введите пароль:');
                } else if (mode === 'awaiting_password') {
                    tempPassword = input;
                    performLogin(tempLogin, tempPassword);
                } else if (mode === 'awaiting_register_login') {
                    tempLogin = input;
                    mode = 'awaiting_register_password';
                    appendHistory('Придумайте пароль:');
                } else if (mode === 'awaiting_register_password') {
                    tempPassword = input;
                    performRegister(tempLogin, tempPassword);
                } else if (mode === 'awaiting_channel_delete_confirmation') {
                    const answer = input.trim().toLowerCase();
                    if (answer === 'да' || answer === 'yes' || answer === 'y' || answer === 'д') {
                        channelDelete(tempChannelName);
                    } else {
                        appendHistory('Удаление отменено.');
                    }
                    resetMode();
                }
                commandInput.value = '';
                render();
            }

            // --- Обработчик событий ввода ---
            commandInput.addEventListener('keydown', (e) => {
                const key = e.key;
                const input = commandInput;

                // Ctrl+V (вставка)
                if (e.ctrlKey && key === 'v') {
                    e.preventDefault();
                    navigator.clipboard.readText().then(text => {
                        const start = input.selectionStart;
                        const end = input.selectionEnd;
                        const newValue = input.value.substring(0, start) + text + input.value.substring(end);
                        input.value = newValue;
                        input.setSelectionRange(start + text.length, start + text.length);
                    }).catch(err => {
                        appendHistory('Не удалось вставить текст: ' + err);
                    });
                    return;
                }

                // Enter
                if (key === 'Enter') {
                    e.preventDefault();
                    executeCommand(input.value);
                    return;
                }

                // Tab
                if (key === 'Tab') {
                    e.preventDefault();
                    handleTab(input.value, input.selectionStart, (newVal, newPos) => {
                        input.value = newVal;
                        input.setSelectionRange(newPos, newPos);
                    });
                    return;
                }

                // Стрелки вверх/вниз для истории команд
                if (key === 'ArrowUp') {
                    e.preventDefault();
                    if (historyIndex > 0) {
                        historyIndex--;
                        input.value = commandHistory[historyIndex] || '';
                        // ставим курсор в конец
                        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
                    }
                    return;
                }
                if (key === 'ArrowDown') {
                    e.preventDefault();
                    if (historyIndex < commandHistory.length - 1) {
                        historyIndex++;
                        input.value = commandHistory[historyIndex] || '';
                        setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
                    } else {
                        historyIndex = commandHistory.length;
                        input.value = '';
                    }
                    return;
                }

                // Остальные клавиши обрабатываются стандартно
            });

            // Фокус на поле ввода при клике на терминал
            document.getElementById('terminalContainer').addEventListener('click', () => commandInput.focus());

            // Стартовый рендер
            render();
        })();
    </script>
</body>
</html>
