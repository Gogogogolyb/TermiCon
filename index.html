<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"
    />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.socket.io 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' ws: wss:; img-src 'self' data: blob:; font-src 'self'; frame-src 'self';"
    />
    <title>TermiCon</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="terminal.js" defer></script>
  </head>
  <body>
    <div class="dos-terminal" id="terminalContainer">
      <div class="dos-screen" id="outputArea"></div>
      <div class="input-line">
        <span class="prompt" id="prompt"></span>
        <input
          type="text"
          class="terminal-input"
          id="commandInput"
          autofocus
          placeholder="Введите команду"
        />
        <div class="autocomplete-menu" id="autocompleteMenu"></div>
      </div>
      <input
        type="file"
        id="fileUpload"
        accept="image/png, image/jpeg, image/gif, image/bmp, image/webp, audio/mp3, audio/wav, audio/ogg, audio/m4a, audio/flac"
      />
      <div class="windows-container" id="windowsContainer"></div>
    </div>
    <script src="sw.js"></script>
  </body>
</html>
